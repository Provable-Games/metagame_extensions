services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: metagame_extensions
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./api
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/metagame_extensions
      PORT: "3002"
    depends_on:
      - db

volumes:
  pgdata:
