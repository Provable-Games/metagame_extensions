services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: metagame_extensions
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./api
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/metagame_extensions
      PORT: "3002"
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:5174"
      STARKNET_RPC_URL: "https://api.cartridge.gg/x/starknet/sepolia"
      MERKLE_VALIDATOR_ADDRESS: "0x07a5b716c65ac5726ecd0b023ff1b4cc9090820707a508b49f5ed42e44a401c4"
    depends_on:
      - db

volumes:
  pgdata:
