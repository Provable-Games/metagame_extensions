databases:
  - name: metagame-merkle-db
    plan: basic-256mb
    databaseName: metagame_extensions
    postgresMajorVersion: 16

services:
  - type: web
    name: metagame-merkle-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: metagame-merkle-db
          property: connectionString
      - key: PORT
        value: "3002"
