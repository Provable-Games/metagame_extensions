[package]
name = "budokan_extensions"
version = "0.1.0"
edition = "2024_07"

[dependencies]
starknet = "2.15.1"
openzeppelin_introspection = "3.0.0" 
openzeppelin_interfaces = "2.1.0"

[profile.dev.cairo]
unstable-add-statements-functions-debug-info = true
unstable-add-statements-code-locations-debug-info = true
inlining-strategy = "avoid"

[tool.snforge]
# exit_first = true

# Fork configuration for testing against deployed contracts
# To use a fork, run: snforge test --fork-name sepolia
# Or: snforge test --fork-name mainnet
[[tool.snforge.fork]]
name = "sepolia"
url = "https://api.cartridge.gg/x/starknet/sepolia/rpc/v0_10"
block_id.number = "6326561"

[[tool.snforge.fork]]
name = "mainnet"
url = "https://api.cartridge.gg/x/starknet/mainnet/rpc/v0_10"
block_id.number = "6123632"

[dev-dependencies]
snforge_std = "0.56.0"

[scripts]
test = "snforge test"

[[target.starknet-contract]]
sierra = true
casm = true

[lib]
