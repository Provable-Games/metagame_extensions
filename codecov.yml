comment:
  layout: "diff, files, header, footer"
  behavior: default

coverage:
  range: 90..100
  status:
    project:
      coverage:
        target: auto
        threshold: 4%
    patch:
      default:
        target: 90%
        threshold: 4%

ignore:
  # Test files
  - "**/tests/**"

  # Build outputs
  - "target/"
  - ".snfoundry_cache/"
  - "snfoundry_trace/"

  # Configuration and scripts
  - "scripts/"

github_checks:
  annotations: false
