comment:
  layout: "diff, files, header, footer"
  behavior: default

coverage:
  range: 90..100
  status:
    project:
      coverage:
        target: auto
        threshold: 4%
    patch:
      default:
        target: 90%
        threshold: 4%

ignore:
  # Test files
  - "**/tests/**"

  # Interfaces
  - "packages/interfaces"

  # Test mocks and constants
  - "packages/test_common/**"

  # External protocol type stubs
  - "packages/validators/src/externals/**"

  # Build outputs
  - "target/"
  - ".snfoundry_cache/"
  - "snfoundry_trace/"

  # Configuration, scripts, and examples
  - "scripts/"
  - "examples/"
  - "snapshot-ui/"

github_checks:
  annotations: false
